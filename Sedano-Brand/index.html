<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sedano Brand — Sistema de Posts</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#fff;font-family:'Inter',sans-serif;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#252525;border-radius:2px}
button{cursor:pointer;font-family:'Inter',sans-serif}
textarea,input{font-family:'Inter',sans-serif}
input[type=range]{accent-color:#C8FF00}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── TWEAKS ────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "handle": "@sedano",
  "accent": "#00FFB2",
  "orbOpacity": 30,
  "gridOpacity": 6
}/*EDITMODE-END*/;

// ── CANVAS ────────────────────────────────────────────────────────────
const PW = 1080, PH = 1080, SW = 1080, SH = 1920, PAD = 88;

// ── PRIMITIVES ────────────────────────────────────────────────────────
const Grid = ({light,op=6}) => <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:1,backgroundImage:light?`linear-gradient(rgba(0,0,0,${op/100}) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,${op/100}) 1px,transparent 1px)`:`linear-gradient(rgba(200,200,200,${op/100}) 1px,transparent 1px),linear-gradient(90deg,rgba(200,200,200,${op/100}) 1px,transparent 1px)`,backgroundSize:'80px 80px'}}/>;
const Orb = ({x='50%',y='50%',size=600,op=17,color='#00FFB2'}) => {const a=Math.round(op*2.55).toString(16).padStart(2,'0');return <div style={{position:'absolute',left:x,top:y,width:size,height:size,transform:'translate(-50%,-50%)',background:`radial-gradient(circle,${color}${a} 0%,transparent 68%)`,filter:'blur(90px)',pointerEvents:'none',zIndex:0}}/>;};
const Chip = ({children,color='#00FFB2',dark}) => <div style={{display:'inline-block',border:`1px solid ${dark?'#000':color}`,color:dark?'#000':color,fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'3.5px',textTransform:'uppercase',padding:'6px 16px',marginBottom:32,alignSelf:'flex-start'}}>{children}</div>;
const Ft = ({handle,num,total}) => <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:16}}><div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'2.5px',textTransform:'uppercase',color:'rgba(255,255,255,0.2)'}}>{handle}</div>{num&&<div style={{fontFamily:'Inter',fontSize:13,color:'rgba(255,255,255,0.2)'}}>{num}/{total}</div>}</div>;
const FtD = ({handle}) => <div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'2.5px',textTransform:'uppercase',color:'rgba(0,0,0,0.25)'}}>{handle}</div>;

// ── SLIDES ────────────────────────────────────────────────────────────
const SlideCapa = ({d,t,num}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><Orb x="78%" y="22%" size={700} op={t.orbOpacity*1.1} color={t.accent}/><Orb x="15%" y="82%" size={440} op={t.orbOpacity*0.55} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',justifyContent:'space-between',padding:PAD}}><div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'3.5px',textTransform:'uppercase',color:t.accent}}>{d.tag||'SISTEMAS DE CONTEÚDO'}</div><div><h1 style={{fontFamily:'Cormorant Garamond',fontSize:112,fontWeight:700,lineHeight:.95,color:'#fff',marginBottom:28,letterSpacing:'-1px'}}>{d.line1||'Isso me levou'}<br/><em style={{color:t.accent}}>{d.highlight||'15 anos,'}</em><br/>{d.line2||'você vai levar 5 minutos.'}</h1><p style={{fontFamily:'Inter',fontSize:26,color:'rgba(255,255,255,0.52)',lineHeight:1.65,maxWidth:680}}>{d.sub||'O framework que uso para criar 30 posts por mês sem improvisar nada.'}</p></div><div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}><div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'2.5px',textTransform:'uppercase',color:'rgba(255,255,255,0.2)'}}>{t.handle}</div><div style={{display:'flex',gap:8}}>{Array.from({length:10},(_,i)=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:i===0?t.accent:'rgba(255,255,255,0.18)'}}/>)}</div></div></div></div>;

const SlideInterna = ({d,t,num,total}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><Orb x="88%" y="12%" size={480} op={t.orbOpacity*.8} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD}}><Chip color={t.accent}>{d.tag||'O PROBLEMA'}</Chip><h2 style={{fontFamily:'Cormorant Garamond',fontSize:82,fontWeight:700,lineHeight:1.02,color:'#fff',marginBottom:36}}>{d.title}</h2><p style={{fontFamily:'Inter',fontSize:26,lineHeight:1.82,color:'rgba(255,255,255,0.62)',flex:1,display:'flex',alignItems:'center'}}>{d.body}</p>{d.highlight&&<div style={{borderLeft:`2.5px solid ${t.accent}`,paddingLeft:24,fontFamily:'Cormorant Garamond',fontStyle:'italic',fontSize:34,color:t.accent,margin:'20px 0 28px'}}>{d.highlight}</div>}<Ft handle={t.handle} num={num} total={total}/></div></div>;

const SlideContraste = ({d,t,num,total}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><div style={{position:'absolute',inset:0,right:'50%',background:'#060606',zIndex:0}}/><div style={{position:'absolute',inset:0,left:'50%',background:'#0d0d0d',zIndex:0}}/><div style={{position:'absolute',top:0,bottom:0,left:'50%',width:1,background:`${t.accent}40`,zIndex:3}}/><Orb x="74%" y="50%" size={440} op={t.orbOpacity*.9} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD}}><div style={{display:'flex',flex:1,gap:0,marginBottom:24}}><div style={{flex:1,paddingRight:54,display:'flex',flexDirection:'column',gap:20,justifyContent:'center'}}><div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'3.5px',textTransform:'uppercase',color:'rgba(255,255,255,0.28)'}}>{d.leftLabel||'ANTES'}</div><h3 style={{fontFamily:'Cormorant Garamond',fontSize:60,fontWeight:700,color:'rgba(255,255,255,0.42)',lineHeight:1.05}}>{d.leftTitle}</h3>{(d.leftItems||[]).map((it,i)=><div key={i} style={{display:'flex',gap:14,alignItems:'flex-start'}}><span style={{color:'rgba(255,255,255,0.2)',fontSize:20,marginTop:4,flexShrink:0}}>×</span><p style={{fontFamily:'Inter',fontSize:22,color:'rgba(255,255,255,0.35)',lineHeight:1.5}}>{it}</p></div>)}</div><div style={{flex:1,paddingLeft:54,display:'flex',flexDirection:'column',gap:20,justifyContent:'center'}}><div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'3.5px',textTransform:'uppercase',color:t.accent}}>{d.rightLabel||'DEPOIS'}</div><h3 style={{fontFamily:'Cormorant Garamond',fontSize:60,fontWeight:700,color:'#fff',lineHeight:1.05}}>{d.rightTitle}</h3>{(d.rightItems||[]).map((it,i)=><div key={i} style={{display:'flex',gap:14,alignItems:'flex-start'}}><span style={{color:t.accent,fontSize:20,marginTop:4,flexShrink:0}}>✓</span><p style={{fontFamily:'Inter',fontSize:22,color:'rgba(255,255,255,0.82)',lineHeight:1.5}}>{it}</p></div>)}</div></div><Ft handle={t.handle} num={num} total={total}/></div></div>;

const SlideOndas = ({d,t,num,total}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><svg style={{position:'absolute',bottom:0,left:0,right:0,zIndex:0,opacity:.16}} viewBox="0 0 1080 480" preserveAspectRatio="none" width="100%" height="45%"><path d="M0,200 C220,90 460,310 720,170 C900,70 1000,210 1080,155 L1080,480 L0,480 Z" fill={t.accent}/><path d="M0,270 C200,175 430,350 680,235 C870,145 990,275 1080,225 L1080,480 L0,480 Z" fill="none" stroke={t.accent} strokeWidth="1.5" opacity=".55"/></svg><Orb x="50%" y="78%" size={600} op={t.orbOpacity} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD}}><Chip color={t.accent}>{d.tag||'A SOLUÇÃO'}</Chip><h2 style={{fontFamily:'Cormorant Garamond',fontSize:90,fontWeight:700,lineHeight:1.02,color:'#fff',maxWidth:820,marginBottom:32}}>{d.title}</h2><p style={{fontFamily:'Inter',fontSize:26,lineHeight:1.8,color:'rgba(255,255,255,0.56)',maxWidth:740}}>{d.body}</p><div style={{marginTop:'auto'}}><Ft handle={t.handle} num={num} total={total}/></div></div></div>;

const SlideDiagrama = ({d,t,num,total}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><Orb x="90%" y="55%" size={480} op={t.orbOpacity*.7} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD}}><Chip color={t.accent}>{d.tag||'FRAMEWORK'}</Chip><h2 style={{fontFamily:'Cormorant Garamond',fontSize:76,fontWeight:700,lineHeight:1.05,color:'#fff',marginBottom:48}}>{d.title}</h2><div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',gap:0}}>{(d.steps||[]).map((s,i,arr)=><div key={i} style={{display:'flex',alignItems:'stretch'}}><div style={{display:'flex',flexDirection:'column',alignItems:'center',marginRight:32}}><div style={{width:44,height:44,border:`1.5px solid ${t.accent}`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter',fontSize:13,fontWeight:700,color:t.accent,flexShrink:0}}>{String(i+1).padStart(2,'0')}</div>{i<arr.length-1&&<div style={{width:1,flex:1,background:`${t.accent}28`,minHeight:20}}/>}</div><div style={{flex:1,paddingBottom:i<arr.length-1?40:0}}><div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,color:t.accent,letterSpacing:'2px',textTransform:'uppercase',marginBottom:8}}>{s.label}</div><div style={{fontFamily:'Inter',fontSize:24,color:'rgba(255,255,255,0.65)',lineHeight:1.55}}>{s.desc}</div></div></div>)}</div><Ft handle={t.handle} num={num} total={total}/></div></div>;

const SlideChecklist = ({d,t,num,total}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><Orb x="82%" y="80%" size={500} op={t.orbOpacity*.8} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD}}><Chip color={t.accent}>{d.tag||'O SISTEMA'}</Chip><h2 style={{fontFamily:'Cormorant Garamond',fontSize:76,fontWeight:700,lineHeight:1.05,color:'#fff',marginBottom:48}}>{d.title}</h2><div style={{flex:1,display:'flex',flexDirection:'column',gap:28,justifyContent:'center'}}>{(d.items||[]).map((it,i)=><div key={i} style={{display:'flex',alignItems:'flex-start',gap:24}}><div style={{width:28,height:28,border:`1.5px solid ${t.accent}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:t.accent,flexShrink:0,marginTop:4}}>✓</div><p style={{fontFamily:'Inter',fontSize:25,lineHeight:1.55,color:'rgba(255,255,255,0.82)'}}><span style={{color:t.accent,fontWeight:600}}>{it.label}:</span> {it.desc}</p></div>)}</div><Ft handle={t.handle} num={num} total={total}/></div></div>;

const SlideQuote = ({d,t,num,total}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><Orb x="50%" y="50%" size={750} op={t.orbOpacity*.65} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD,justifyContent:'center'}}><div style={{width:52,height:1,background:t.accent,marginBottom:60}}/><blockquote style={{fontFamily:'Cormorant Garamond',fontStyle:'italic',fontSize:86,fontWeight:600,lineHeight:1.12,color:'#fff',marginBottom:60}}>"{d.quote}"</blockquote><div style={{width:52,height:1,background:t.accent,alignSelf:'flex-end',marginBottom:48}}/><Ft handle={t.handle} num={num} total={total}/></div></div>;

const SlideCTA = ({d,t}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><Orb x="50%" y="38%" size={780} op={t.orbOpacity*1.2} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD,justifyContent:'space-between'}}><div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'3.5px',textTransform:'uppercase',color:t.accent}}>{d.tag||'PRÓXIMO PASSO'}</div><div><h2 style={{fontFamily:'Cormorant Garamond',fontSize:96,fontWeight:700,lineHeight:1.0,color:'#fff',marginBottom:28}}>Comente <em style={{color:t.accent}}>"{d.cta_word||'SISTEMA'}"</em><br/>{d.line2||'e eu te envio o guia completo.'}</h2><p style={{fontFamily:'Inter',fontSize:25,color:'rgba(255,255,255,0.44)',lineHeight:1.65}}>{d.sub||'Ou acesse o link na bio para começar agora.'}</p></div><div style={{display:'flex',alignItems:'center',gap:18}}><div style={{width:50,height:50,borderRadius:'50%',background:t.accent,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'#000',fontWeight:800,fontSize:18}}>S</span></div><div><div style={{fontFamily:'Inter',fontSize:17,fontWeight:700,color:'#fff'}}>Romulo Sedano</div><div style={{fontFamily:'Inter',fontSize:14,color:'rgba(255,255,255,0.38)'}}>{t.handle}</div></div></div></div></div>;

const SlideMinimalista = ({d,t,num,total}) => <div style={{width:PW,height:PH,background:'#fff',position:'relative',overflow:'hidden'}}><Grid light op={t.gridOpacity}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD}}><Chip color='#000' dark>{d.tag||'REFLEXÃO'}</Chip><h2 style={{fontFamily:'Cormorant Garamond',fontStyle:'italic',fontSize:88,fontWeight:600,lineHeight:1.06,color:'#000',marginBottom:32}}>{d.title}</h2><div style={{width:52,height:2,background:'#000',margin:'8px 0 36px'}}/><p style={{fontFamily:'Inter',fontSize:26,lineHeight:1.8,color:'#333',flex:1,display:'flex',alignItems:'center'}}>{d.body}</p><FtD handle={t.handle}/></div></div>;

const SlideHibrido = ({d,t,num,total}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><Orb x="52%" y="50%" size={600} op={t.orbOpacity*.85} color={t.accent}/><div style={{position:'absolute',right:0,top:0,bottom:0,width:'44%',zIndex:1,background:'repeating-linear-gradient(45deg,#0c0c0c 0,#0c0c0c 12px,#111 12px,#111 24px)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10}}><div style={{width:56,height:56,border:'1px solid rgba(255,255,255,0.1)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.15)',fontSize:22}}>👤</div><div style={{fontFamily:'monospace',fontSize:14,color:'rgba(255,255,255,0.13)',textAlign:'center',lineHeight:1.6}}>foto de estúdio<br/>do founder</div></div><div style={{position:'absolute',right:'44%',top:0,bottom:0,width:1,background:`${t.accent}28`,zIndex:3}}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD,paddingRight:'48%'}}><Chip color={t.accent}>{d.tag||'AUTORIDADE'}</Chip><h2 style={{fontFamily:'Cormorant Garamond',fontSize:72,fontWeight:700,lineHeight:1.05,color:'#fff',marginBottom:28,flex:1}}>{d.title}</h2><p style={{fontFamily:'Inter',fontSize:22,color:'rgba(255,255,255,0.52)',lineHeight:1.7,marginBottom:28}}>{d.body}</p><Ft handle={t.handle} num={num} total={total}/></div></div>;

const SlideManifesto = ({d,t}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><Orb x="50%" y="50%" size={700} op={t.orbOpacity*.5} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD,justifyContent:'center',alignItems:'center',textAlign:'center'}}><div style={{fontFamily:'Inter',fontSize:11,fontWeight:700,letterSpacing:'6px',textTransform:'uppercase',color:'rgba(255,255,255,0.25)',marginBottom:60}}>{d.tag||'MANIFESTO'}</div><h1 style={{fontFamily:'Cormorant Garamond',fontStyle:'italic',fontSize:100,fontWeight:600,lineHeight:1.08,color:'#fff',maxWidth:860}}>{d.line1}<br/><span style={{color:t.accent}}>{d.highlight}</span><br/>{d.line2}</h1><div style={{width:40,height:1,background:t.accent,margin:'60px auto 0'}}/><div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'3px',textTransform:'uppercase',color:'rgba(255,255,255,0.2)',marginTop:32}}>{t.handle}</div></div></div>;

const SlideChaosClarity = ({d,t}) => <div style={{width:PW,height:PH,background:'#111',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity*1.4}/><div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:1,background:`radial-gradient(ellipse 38% 68% at 26% 0%,rgba(255,255,255,0.11) 0%,transparent 65%),radial-gradient(ellipse 38% 68% at 74% 0%,rgba(255,255,255,0.11) 0%,transparent 65%)`}}/><div style={{position:'absolute',top:0,bottom:0,left:'50%',width:1.5,background:'rgba(255,255,255,0.85)',boxShadow:'0 0 18px rgba(255,255,255,0.45)',zIndex:3}}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD}}>{d.tag&&<div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'4px',textTransform:'uppercase',color:'rgba(255,255,255,0.28)',marginBottom:64,textAlign:'center'}}>{d.tag}</div>}<div style={{flex:1,display:'flex',alignItems:'center'}}><div style={{flex:1,textAlign:'right',paddingRight:36}}><div style={{fontFamily:'Inter',fontSize:108,fontWeight:900,color:'#fff',letterSpacing:'-3px',lineHeight:.92,textTransform:'uppercase'}}>{d.word1||'CAOS'}</div></div><div style={{flex:1,textAlign:'left',paddingLeft:40}}><div style={{fontFamily:'Inter',fontSize:108,fontWeight:900,color:t.accent,letterSpacing:'-3px',lineHeight:.92,textTransform:'uppercase'}}>{d.word2||'CLAREZA'}</div></div></div>{d.sub&&<div style={{fontFamily:'Inter',fontSize:21,color:'rgba(255,255,255,0.32)',textAlign:'center',marginBottom:24}}>{d.sub}</div>}<Ft handle={t.handle}/></div></div>;

const SlideTabela = ({d,t}) => <div style={{width:PW,height:PH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:PAD,justifyContent:'center',gap:52}}>{d.title&&<h2 style={{fontFamily:'Cormorant Garamond',fontSize:66,fontWeight:700,color:'#fff',textAlign:'center',lineHeight:1.05}}>{d.title}</h2>}<table style={{borderCollapse:'collapse',width:'100%'}}><thead><tr><th style={{border:'1px solid rgba(255,255,255,0.28)',padding:'24px 32px',fontFamily:'Inter',fontSize:20,fontWeight:700,color:'rgba(255,255,255,0.6)',letterSpacing:'3px',textTransform:'uppercase',textAlign:'center'}}>{d.col1||'ANTES'}</th><th style={{border:`1px solid ${t.accent}55`,padding:'24px 32px',fontFamily:'Inter',fontSize:20,fontWeight:700,color:t.accent,letterSpacing:'3px',textTransform:'uppercase',textAlign:'center'}}>{d.col2||'DEPOIS'}</th></tr></thead><tbody>{(d.rows||[]).map((row,i)=><tr key={i}><td style={{border:'1px solid rgba(255,255,255,0.1)',padding:'22px 32px',fontFamily:'Inter',fontSize:18,color:'rgba(255,255,255,0.38)',letterSpacing:'1.5px',textTransform:'uppercase',textAlign:'center',lineHeight:1.4}}>{row[0]}</td><td style={{border:`1px solid ${t.accent}22`,padding:'22px 32px',fontFamily:'Inter',fontSize:18,color:'rgba(255,255,255,0.85)',letterSpacing:'1.5px',textTransform:'uppercase',textAlign:'center',lineHeight:1.4}}>{row[1]}</td></tr>)}</tbody></table><Ft handle={t.handle}/></div></div>;

// Stories
const StoryHook = ({d,t}) => <div style={{width:SW,height:SH,background:'#000',position:'relative',overflow:'hidden'}}><Grid op={t.gridOpacity}/><Orb x="50%" y="40%" size={700} op={t.orbOpacity*1.15} color={t.accent}/><div style={{position:'relative',zIndex:2,height:'100%',display:'flex',flexDirection:'column',padding:100,paddingTop:160,paddingBottom:130}}><div style={{fontFamily:'Inter',fontSize:13,fontWeight:700,letterSpacing:'3.5px',textTransform:'uppercase',color:t.accent,marginBottom:48}}>{d.tag||'DICA'}</div><div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center'}}><h1 style={{fontFamily:'Cormorant Garamond',fontSize:110,fontWeight:700,lineHeight:1.0,color:'#fff',marginBottom:36}}>{d.title}</h1><p style={{fontFamily:'Inter',fontSize:28,color:'rgba(255,255,255,0.52)',lineHeight:1.65}}>{d.sub}</p></div><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12}}><div style={{width:1,height:60,background:`${t.accent}55`}}/><div style={{fontFamily:'Inter',fontSize:14,fontWeight:700,letterSpacing:'3px',color:t.accent}}>{d.cta||'ARRASTE PARA CIMA ↑'}</div></div></div></div>;

// ── BRAND CORE (compact — fits within token budget) ───────────────────
const BRAND_CORE = `MARCA: Romulo Sedano — Designer/Founder, alto ticket, Matt Gray style.
TOM: técnico, direto, sem clichês. Nunca frases como "acredite em você", "transforme sua vida".
PROFUNDIDADE: Nível 4 mínimo — sempre nomear o framework (ex: "Método Sedano OS", "Framework X").
ESTRUTURA NARRATIVA: Prisão (dor real) → Causa raiz → Sistema proprietário → Transformação → CTA único.
NICHO: Founders, liderança sistêmica, marca pessoal, comunicação de autoridade, design estratégico.
REGRA: Cada slide = 1 ideia. Títulos ≤ 12 palavras. Corpo ≤ 25 palavras. Seja específico e técnico.`;

// ── APP ───────────────────────────────────────────────────────────────
const App = () => {
  const [carousel, setCarousel] = useState(()=>{try{const s=JSON.parse(localStorage.getItem('s_carousel'));return s&&s.length?s:DEF_CAROUSEL;}catch{return DEF_CAROUSEL;}});
  const [posts, setPosts] = useState(()=>{try{const s=JSON.parse(localStorage.getItem('s_posts'));return s&&s.length?s:DEF_POSTS;}catch{return DEF_POSTS;}});
  const [stories, setStories] = useState(()=>{try{const s=JSON.parse(localStorage.getItem('s_stories'));return s&&s.length?s:DEF_STORIES;}catch{return DEF_STORIES;}});
  
  const [sel, setSel] = useState({section:'carousel',idx:0}); // section: carousel|post|story
  const [tweaks, setTweaks] = useState({...TWEAK_DEFAULTS});
  const [showTweaks, setShowTweaks] = useState(false);
  const [caption, setCaption] = useState('');
  const [hashtags, setHashtags] = useState('');
  const [copied, setCopied] = useState(false);
  const [rightTab, setRightTab] = useState('editar');
  const [genState, setGenState] = useState({loading:false,status:'',error:''});
  const [temas, setTemas] = useState({carousel:'',post:'',story:''});
  const [expanded, setExpanded] = useState({carousel:true,post:true,story:true});

  // Persist
  useEffect(()=>{localStorage.setItem('s_carousel',JSON.stringify(carousel));},[carousel]);
  useEffect(()=>{localStorage.setItem('s_posts',JSON.stringify(posts));},[posts]);
  useEffect(()=>{localStorage.setItem('s_stories',JSON.stringify(stories));},[stories]);

  // Tweaks bridge
  useEffect(()=>{
    const h=(e)=>{if(e.data?.type==='__activate_edit_mode')setShowTweaks(true);if(e.data?.type==='__deactivate_edit_mode')setShowTweaks(false);};
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const updateTweak=(key,val)=>{setTweaks(t=>{const n={...t,[key]:val};window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[key]:val}},'*');return n;});};

  // Current item
  const dataMap = {carousel,post:posts,story:stories};
  const setDataMap = {carousel:setCarousel,post:setPosts,story:setStories};
  const currentData = dataMap[sel.section]||[];
  const currentItem = currentData[sel.idx]||currentData[0];
  const isStory = sel.section==='story';

  // Keyboard nav
  useEffect(()=>{
    const h=(e)=>{
      if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
      if(e.key==='ArrowRight'||e.key==='ArrowDown')setSel(s=>({...s,idx:(s.idx+1)%currentData.length}));
      if(e.key==='ArrowLeft'||e.key==='ArrowUp')setSel(s=>({...s,idx:(s.idx-1+currentData.length)%currentData.length}));
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[currentData.length]);

  // ── SLIDE EDITOR ────────────────────────────────────────────────
  const updateField=(field,value)=>{
    const setter=setDataMap[sel.section];
    setter(prev=>{const n=[...prev];n[sel.idx]={...n[sel.idx],d:{...n[sel.idx].d,[field]:value}};return n;});
  };
  const updateItem=(arr,idx,subField,value)=>{
    const setter=setDataMap[sel.section];
    setter(prev=>{const n=[...prev];const a=[...(n[sel.idx].d[arr]||[])];a[idx]=subField?{...a[idx],[subField]:value}:value;n[sel.idx]={...n[sel.idx],d:{...n[sel.idx].d,[arr]:a}};return n;});
  };

  // ── GENERATION ──────────────────────────────────────────────────
  const setStatus=(s,err='')=>setGenState(g=>({...g,status:s,error:err}));

  const generateCarousel = async (tema) => {
    if (!tema.trim()) return;
    setGenState({loading:true,status:'Gerando slides 1-5...',error:''});
    try {
      // CALL 1: Slides 1-5
      const p1 = `${BRAND_CORE}\nTema: "${tema}"\nCrie os slides 1-5. Retorne JSON puro sem comentários:\n{"slides":[{"tipo":"capa","tag":"","line1":"","highlight":"","line2":"","sub":""},{"tipo":"interna","tag":"O PROBLEMA","title":"","body":"","highlight":""},{"tipo":"interna","tag":"A CAUSA RAIZ","title":"","body":"","highlight":""},{"tipo":"contraste","leftLabel":"SEM SISTEMA","rightLabel":"SEDANO OS","leftTitle":"","rightTitle":"","leftItems":["","",""],"rightItems":["","",""]},{"tipo":"ondas","tag":"A SOLUÇÃO","title":"","body":""}]}`;
      
      const r1 = await window.claude.complete({messages:[{role:'user',content:p1}]});
      const clean1 = r1.trim().replace(/^```json\n?/,'').replace(/\n?```$/,'').replace(/^```\n?/,'');
      const d1 = JSON.parse(clean1);

      setStatus('Gerando slides 6-10...');
      // CALL 2: Slides 6-10
      const p2 = `${BRAND_CORE}\nTema: "${tema}" (slides 6-10 do carrossel, continuação).\nRetorne JSON puro:\n{"slides":[{"tipo":"diagrama","tag":"PASSO 01","title":"","steps":[{"label":"","desc":""},{"label":"","desc":""},{"label":"","desc":""}]},{"tipo":"checklist","tag":"PASSO 02","title":"","items":[{"label":"","desc":""},{"label":"","desc":""},{"label":"","desc":""},{"label":"","desc":""}]},{"tipo":"checklist","tag":"PASSO 03","title":"","items":[{"label":"","desc":""},{"label":"","desc":""},{"label":"","desc":""},{"label":"","desc":""}]},{"tipo":"quote","quote":""},{"tipo":"cta","tag":"PRÓXIMO PASSO","cta_word":"","line2":"","sub":""}]}`;

      const r2 = await window.claude.complete({messages:[{role:'user',content:p2}]});
      const clean2 = r2.trim().replace(/^```json\n?/,'').replace(/\n?```$/,'').replace(/^```\n?/,'');
      const d2 = JSON.parse(clean2);

      const allSlides = [...d1.slides,...d2.slides];
      const labels=['01 — Capa','02 — A Dor','03 — A Causa','04 — O Paradigma','05 — A Virada','06 — Sistema 1','07 — Sistema 2','08 — Sistema 3','09 — Transformação','10 — CTA'];
      const newCarousel = allSlides.map((s,i)=>({label:labels[i]||`${i+1}`,type:s.tipo,d:s}));
      setCarousel(newCarousel);
      setSel({section:'carousel',idx:0});

      setStatus('Gerando legenda...');
      const cp = `${BRAND_CORE}\nTema: "${tema}"\nEscreva uma legenda do Instagram. Estrutura:\n1. GANCHO (1 linha sem ponto final)\n2. Linha em branco\n3. Corpo (3 parágrafos curtos, linha em branco entre eles, profundidade técnica nível 4)\n4. Linha em branco\n5. CTA único: "Comente [PALAVRA] e eu te envio [o quê]"\n\nDepois adicione 20 hashtags relevantes.\n\nFormato:\nLEGENDA:\n[texto]\n\nHASHTAGS:\n[hashtags]`;
      const cr = await window.claude.complete({messages:[{role:'user',content:cp}]});
      const lm=cr.match(/LEGENDA:\n([\s\S]*?)(?:\n\nHASHTAGS:|$)/);
      const hm=cr.match(/HASHTAGS:\n([\s\S]*?)$/);
      if(lm)setCaption(lm[1].trim());
      if(hm)setHashtags(hm[1].trim());
      setRightTab('legenda');
      setGenState({loading:false,status:'✓ Carrossel gerado com sucesso!',error:''});
      setTimeout(()=>setGenState(g=>({...g,status:''})),4000);
    } catch(e) {
      console.error('Generation error:',e);
      setGenState({loading:false,status:'',error:`Erro: ${e.message||'Verifique o console'}. Tente novamente.`});
    }
  };

  const generatePost = async (tema) => {
    if(!tema.trim())return;
    setGenState({loading:true,status:'Gerando post...',error:''});
    try {
      const p=`${BRAND_CORE}\nTema: "${tema}"\nCrie 1 post visual de alto impacto. Escolha o tipo mais adequado para o tema.\nRetorne JSON puro (escolha UM dos formatos):\n{"tipo":"quote","quote":"frase autoral poderosa máx 20 palavras"}\nOU\n{"tipo":"checklist","tag":"TAG","title":"Título impactante","items":[{"label":"L1","desc":"desc concisa"},{"label":"L2","desc":"desc"},{"label":"L3","desc":"desc"},{"label":"L4","desc":"desc"}]}\nOU\n{"tipo":"contraste","leftLabel":"ANTES","rightLabel":"DEPOIS","leftTitle":"estado negativo","rightTitle":"estado positivo","leftItems":["item1","item2","item3"],"rightItems":["item1","item2","item3"]}\nOU\n{"tipo":"manifesto","tag":"MANIFESTO","line1":"frase 1","highlight":"frase de destaque","line2":"frase conclusão"}`;
      const r=await window.claude.complete({messages:[{role:'user',content:p}]});
      const clean=r.trim().replace(/^```json\n?/,'').replace(/\n?```$/,'').replace(/^```\n?/,'');
      const d=JSON.parse(clean);
      const newPost={label:`Post — ${tema.slice(0,20)}`,type:d.tipo,d};
      setPosts(prev=>[newPost,...prev]);
      setSel({section:'post',idx:0});
      setGenState({loading:false,status:'✓ Post gerado!',error:''});
      setTimeout(()=>setGenState(g=>({...g,status:''})),3000);
    } catch(e){
      setGenState({loading:false,status:'',error:`Erro: ${e.message}. Tente novamente.`});
    }
  };

  const generateStory = async (tema) => {
    if(!tema.trim())return;
    setGenState({loading:true,status:'Gerando story...',error:''});
    try {
      const p=`${BRAND_CORE}\nTema: "${tema}"\nCrie 1 story de alto impacto. Retorne JSON puro:\n{"tipo":"story_hook","tag":"TAG","title":"Título impactante","sub":"subtítulo","cta":"TEXTO DO CTA"}\nOU\n{"tipo":"story_tip","tag":"FRAMEWORK","title":"Título","items":["item 1","item 2","item 3"]}\nOU\n{"tipo":"story_quote","quote":"frase de impacto máx 15 palavras"}`;
      const r=await window.claude.complete({messages:[{role:'user',content:p}]});
      const clean=r.trim().replace(/^```json\n?/,'').replace(/\n?```$/,'').replace(/^```\n?/,'');
      const d=JSON.parse(clean);
      const newStory={label:`Story — ${tema.slice(0,20)}`,type:d.tipo,d};
      setStories(prev=>[newStory,...prev]);
      setSel({section:'story',idx:0});
      setGenState({loading:false,status:'✓ Story gerado!',error:''});
      setTimeout(()=>setGenState(g=>({...g,status:''})),3000);
    } catch(e){
      setGenState({loading:false,status:'',error:`Erro: ${e.message}. Tente novamente.`});
    }
  };

  // ── STYLES ──────────────────────────────────────────────────────
  const inp={width:'100%',background:'#111',border:'1px solid #222',borderRadius:3,padding:'6px 10px',color:'rgba(255,255,255,0.85)',fontSize:11.5,outline:'none',fontFamily:'Inter',lineHeight:1.55};
  const lbl={fontFamily:'Inter',fontSize:9,color:'rgba(255,255,255,0.28)',letterSpacing:'0.12em',textTransform:'uppercase',display:'block',marginBottom:5};

  // ── PREVIEW SIZING ───────────────────────────────────────────────
  const dispW = isStory?252:460;
  const dispH = isStory?Math.round(252*(SH/SW)):460;
  const cW = isStory?SW:PW;
  const cH = isStory?SH:PH;
  const scale = dispW/cW;

  // ── SECTION COMPONENT ────────────────────────────────────────────
  const Section = ({id,label,count,items,genKey,onGenerate}) => {
    const isOpen=expanded[id];
    const tema=temas[genKey]||'';
    return (
      <div style={{borderBottom:'1px solid #161616'}}>
        <div onClick={()=>setExpanded(e=>({...e,[id]:!e[id]}))} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',cursor:'pointer',userSelect:'none'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontFamily:'Inter',fontSize:9,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:tweaks.accent}}>{label}</span>
            <span style={{fontFamily:'Inter',fontSize:9,color:'rgba(255,255,255,0.22)'}}>{count}</span>
          </div>
          <span style={{color:'rgba(255,255,255,0.3)',fontSize:10,transition:'transform .2s',transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>›</span>
        </div>
        {isOpen&&<>
          <div style={{padding:'0 8px 8px'}}>
            {items.map((item,i)=>(
              <div key={i} onClick={()=>{setSel({section:id,idx:i});}} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',borderRadius:3,cursor:'pointer',background:sel.section===id&&sel.idx===i?'#1a1a1a':'transparent',marginBottom:1}}>
                {sel.section===id&&sel.idx===i&&<div style={{width:3,height:3,borderRadius:'50%',background:tweaks.accent,flexShrink:0}}/>}
                <span style={{fontFamily:'Inter',fontSize:10.5,color:sel.section===id&&sel.idx===i?'#fff':'rgba(255,255,255,0.38)',fontWeight:sel.section===id&&sel.idx===i?600:400,flex:1}}>{item.label}</span>
                <button onClick={e=>{e.stopPropagation();setDataMap[id](p=>p.filter((_,j)=>j!==i));if(sel.section===id&&sel.idx>=i)setSel(s=>({...s,idx:Math.max(0,s.idx-1)}));}} style={{background:'transparent',border:'none',color:'rgba(255,255,255,0.15)',fontSize:9,padding:'0 2px',opacity:0,transition:'opacity .15s'}} className="del-btn">✕</button>
              </div>
            ))}
          </div>
          <div style={{padding:'0 10px 12px'}}>
            <div style={{display:'flex',gap:6}}>
              <input value={tema} onChange={e=>setTemas(t=>({...t,[genKey]:e.target.value}))} onKeyDown={e=>{if(e.key==='Enter')onGenerate(tema);}} placeholder={`Tema do ${label.toLowerCase()}...`} style={{...inp,flex:1,fontSize:10.5}} disabled={genState.loading}/>
              <button onClick={()=>onGenerate(tema)} disabled={genState.loading||!tema.trim()} style={{background:genState.loading||!tema.trim()?'#1a1a1a':tweaks.accent,border:'none',borderRadius:3,color:genState.loading||!tema.trim()?'rgba(255,255,255,0.2)':'#000',fontFamily:'Inter',fontSize:10,fontWeight:700,padding:'0 12px',cursor:genState.loading||!tema.trim()?'not-allowed':'pointer',whiteSpace:'nowrap',flexShrink:0}}>
                {genState.loading?'..':'+ Gerar'}
              </button>
            </div>
          </div>
        </>}
      </div>
    );
  };

  // ── EDITOR PANEL ─────────────────────────────────────────────────
  const EditorPanel = () => {
    if(!currentItem)return null;
    const {type,d}=currentItem;
    const F=({label,field,rows})=><div style={{marginBottom:10}}><div style={lbl}>{label}</div>{rows?<textarea value={d[field]||''} onChange={e=>updateField(field,e.target.value)} rows={rows} style={{...inp,resize:'none'}}/>:<input value={d[field]||''} onChange={e=>updateField(field,e.target.value)} style={inp}/>}</div>;
    return(
      <div style={{padding:14,overflowY:'auto',flex:1}}>
        <div style={{fontFamily:'Inter',fontSize:9,color:tweaks.accent,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:12}}>{currentItem.label}</div>
        {type==='capa'&&<><F label="Tag" field="tag"/><F label="Linha 1" field="line1"/><F label="Destaque Neon" field="highlight"/><F label="Linha 2" field="line2"/><F label="Subtítulo" field="sub" rows={2}/></>}
        {type==='interna'&&<><F label="Tag" field="tag"/><F label="Título" field="title" rows={2}/><F label="Corpo" field="body" rows={3}/><F label="Destaque itálico" field="highlight" rows={2}/></>}
        {type==='ondas'&&<><F label="Tag" field="tag"/><F label="Título" field="title" rows={2}/><F label="Corpo" field="body" rows={3}/></>}
        {type==='quote'&&<F label="Quote" field="quote" rows={3}/>}
        {type==='cta'&&<><F label="Tag" field="tag"/><F label="Palavra CTA" field="cta_word"/><F label="Linha 2" field="line2"/><F label="Subtítulo" field="sub" rows={2}/></>}
        {type==='manifesto'&&<><F label="Tag" field="tag"/><F label="Linha 1" field="line1"/><F label="Destaque" field="highlight"/><F label="Linha 2" field="line2"/></>}
        {type==='chaos_clarity'&&<><F label="Tag" field="tag"/><F label="Palavra Esquerda" field="word1"/><F label="Palavra Direita" field="word2"/><F label="Subtítulo" field="sub"/></>}
        {type==='minimalista'&&<><F label="Tag" field="tag"/><F label="Título" field="title" rows={2}/><F label="Corpo" field="body" rows={3}/></>}
        {type==='hibrido'&&<><F label="Tag" field="tag"/><F label="Título" field="title" rows={2}/><F label="Corpo" field="body" rows={2}/></>}
        {(type==='story_hook')&&<><F label="Tag" field="tag"/><F label="Título" field="title" rows={2}/><F label="Subtítulo" field="sub" rows={2}/><F label="CTA" field="cta"/></>}
        {(type==='story_tip')&&<><F label="Tag" field="tag"/><F label="Título" field="title" rows={2}/><div style={{marginBottom:10}}><div style={lbl}>Itens</div>{(d.items||[]).map((it,i)=><input key={i} value={it} onChange={e=>updateItem('items',i,null,e.target.value)} style={{...inp,marginBottom:4}}/>)}</div></>}
        {(type==='story_quote'||type==='story_cta')&&<F label="Quote/Título" field={type==='story_quote'?'quote':'title'} rows={3}/>}
        {type==='contraste'&&<><F label="Label Esq." field="leftLabel"/><F label="Título Esq." field="leftTitle"/><div style={{marginBottom:10}}><div style={lbl}>Itens Esquerda</div>{(d.leftItems||[]).map((it,i)=><input key={i} value={it} onChange={e=>updateItem('leftItems',i,null,e.target.value)} style={{...inp,marginBottom:4}}/>)}</div><F label="Label Dir." field="rightLabel"/><F label="Título Dir." field="rightTitle"/><div style={{marginBottom:10}}><div style={lbl}>Itens Direita</div>{(d.rightItems||[]).map((it,i)=><input key={i} value={it} onChange={e=>updateItem('rightItems',i,null,e.target.value)} style={{...inp,marginBottom:4}}/>)}</div></>}
        {type==='checklist'&&<><F label="Tag" field="tag"/><F label="Título" field="title" rows={2}/><div style={{marginBottom:10}}><div style={lbl}>Itens</div>{(d.items||[]).map((it,i)=><div key={i} style={{background:'#0f0f0f',border:'1px solid #1e1e1e',borderRadius:3,padding:8,marginBottom:6}}><input value={it.label||''} onChange={e=>updateItem('items',i,'label',e.target.value)} placeholder="Rótulo" style={{...inp,marginBottom:4,fontSize:10.5}}/><textarea value={it.desc||''} onChange={e=>updateItem('items',i,'desc',e.target.value)} rows={2} style={{...inp,resize:'none',fontSize:10.5}}/></div>)}</div></>}
        {type==='diagrama'&&<><F label="Tag" field="tag"/><F label="Título" field="title" rows={2}/><div style={{marginBottom:10}}><div style={lbl}>Passos</div>{(d.steps||[]).map((s,i)=><div key={i} style={{background:'#0f0f0f',border:'1px solid #1e1e1e',borderRadius:3,padding:8,marginBottom:6}}><input value={s.label||''} onChange={e=>updateItem('steps',i,'label',e.target.value)} placeholder="Nome" style={{...inp,marginBottom:4,fontSize:10.5}}/><textarea value={s.desc||''} onChange={e=>updateItem('steps',i,'desc',e.target.value)} rows={2} style={{...inp,resize:'none',fontSize:10.5}}/></div>)}</div></>}
        {type==='tabela'&&<><F label="Título" field="title"/><F label="Coluna 1" field="col1"/><F label="Coluna 2" field="col2"/><div style={{marginBottom:10}}><div style={lbl}>Linhas</div>{(d.rows||[]).map((row,i)=><div key={i} style={{display:'flex',gap:6,marginBottom:4}}><input value={row[0]||''} onChange={e=>{const r=[...d.rows];r[i]=[e.target.value,r[i][1]];updateField('rows',r);}} style={{...inp,flex:1,fontSize:10.5}}/><input value={row[1]||''} onChange={e=>{const r=[...d.rows];r[i]=[r[i][0],e.target.value];updateField('rows',r);}} style={{...inp,flex:1,fontSize:10.5}}/></div>)}</div></>}
      </div>
    );
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#050505'}}>
      
      {/* ── LEFT SIDEBAR ── */}
      <div style={{width:228,background:'#090909',borderRight:'1px solid #161616',display:'flex',flexDirection:'column',flexShrink:0}}>
        {/* Logo */}
        <div style={{padding:'16px 14px 14px',borderBottom:'1px solid #161616',flexShrink:0}}>
          <div style={{fontFamily:'Cormorant Garamond',fontSize:16,fontWeight:700,color:'#fff',letterSpacing:'-0.02em'}}>Sedano <span style={{color:tweaks.accent}}>Brand</span></div>
          <div style={{fontFamily:'Inter',fontSize:9,color:'rgba(255,255,255,0.2)',marginTop:2,letterSpacing:'0.2em',textTransform:'uppercase'}}>Sistema de Posts</div>
        </div>
        
        {/* Status/Error */}
        {(genState.status||genState.error)&&(
          <div style={{padding:'8px 14px',background:genState.error?'#1a0a0a':'#0a1a0a',borderBottom:'1px solid #222',flexShrink:0}}>
            <div style={{fontFamily:'Inter',fontSize:10,color:genState.error?'#ff6b6b':tweaks.accent,lineHeight:1.5}}>{genState.error||genState.status}</div>
          </div>
        )}

        {/* Sections */}
        <div style={{flex:1,overflowY:'auto'}}>
          <Section id="carousel" label="Carrossel" count={carousel.length} genKey="carousel" items={carousel} onGenerate={generateCarousel}/>
          <Section id="post" label="Post Simples" count={posts.length} genKey="post" items={posts} onGenerate={generatePost}/>
          <Section id="story" label="Stories" count={stories.length} genKey="story" items={stories} onGenerate={generateStory}/>
        </div>

        {/* Footer */}
        <div style={{padding:'10px 14px',borderTop:'1px solid #161616',flexShrink:0}}>
          <div style={{fontFamily:'Inter',fontSize:9,color:'rgba(255,255,255,0.18)',letterSpacing:'0.08em'}}>← → navegar · Enter gerar</div>
        </div>
      </div>

      {/* ── CENTER: PREVIEW ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,overflow:'hidden',position:'relative',background:'#050505'}}>
        {currentItem&&<>
          <div style={{fontFamily:'Inter',fontSize:9,fontWeight:700,letterSpacing:'0.22em',textTransform:'uppercase',color:'rgba(255,255,255,0.18)'}}>{currentItem.label}</div>
          
          {/* Preview */}
          <div style={{width:dispW,height:dispH,overflow:'hidden',position:'relative',boxShadow:'0 40px 100px rgba(0,0,0,0.95),0 0 0 1px rgba(255,255,255,0.04)',flexShrink:0}}>
            <div style={{width:cW,height:cH,transform:`scale(${scale})`,transformOrigin:'top left',position:'absolute',top:0,left:0}}>
              {render(currentItem.type,currentItem.d,tweaks,sel.idx+1,currentData.length)}
            </div>
          </div>

          {/* Nav dots */}
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button onClick={()=>setSel(s=>({...s,idx:(s.idx-1+currentData.length)%currentData.length}))} style={{width:30,height:30,borderRadius:'50%',background:'#141414',border:'1px solid #252525',color:'rgba(255,255,255,0.4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>‹</button>
            <div style={{display:'flex',gap:4}}>
              {currentData.map((_,i)=><div key={i} onClick={()=>setSel(s=>({...s,idx:i}))} style={{width:sel.idx===i?16:4,height:4,borderRadius:2,background:sel.idx===i?tweaks.accent:'#252525',cursor:'pointer',transition:'all 0.2s'}}/>)}
            </div>
            <button onClick={()=>setSel(s=>({...s,idx:(s.idx+1)%currentData.length}))} style={{width:30,height:30,borderRadius:'50%',background:'#141414',border:'1px solid #252525',color:'rgba(255,255,255,0.4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>›</button>
          </div>
        </>}
      </div>

      {/* ── RIGHT PANEL ── */}
      <div style={{width:258,background:'#090909',borderLeft:'1px solid #161616',display:'flex',flexDirection:'column',flexShrink:0}}>
        {/* Tabs */}
        <div style={{display:'flex',borderBottom:'1px solid #161616',flexShrink:0}}>
          {[['editar','Editar'],['legenda','Legenda']].map(([key,label])=>(
            <button key={key} onClick={()=>setRightTab(key)} style={{flex:1,padding:'12px 0',background:'transparent',border:'none',borderBottom:rightTab===key?`2px solid ${tweaks.accent}`:'2px solid transparent',color:rightTab===key?tweaks.accent:'rgba(255,255,255,0.28)',fontFamily:'Inter',fontSize:9,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',cursor:'pointer',marginBottom:-1}}>{label}</button>
          ))}
        </div>

        {rightTab==='editar'&&<EditorPanel/>}
        
        {rightTab==='legenda'&&(
          <div style={{flex:1,padding:14,display:'flex',flexDirection:'column',gap:12,overflowY:'auto'}}>
            {caption?(
              <>
                <div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <div style={lbl}>Legenda</div>
                    <button onClick={()=>{navigator.clipboard.writeText(caption+'\n\n.\n.\n.\n'+hashtags);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{background:'transparent',border:`1px solid ${copied?tweaks.accent:'#333'}`,color:copied?tweaks.accent:'rgba(255,255,255,0.35)',fontFamily:'Inter',fontSize:9,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',padding:'3px 8px',borderRadius:2,cursor:'pointer'}}>{copied?'✓':'Copiar'}</button>
                  </div>
                  <textarea value={caption} onChange={e=>setCaption(e.target.value)} rows={10} style={{...inp,resize:'none',lineHeight:1.7,fontSize:11}}/>
                </div>
                {hashtags&&<div><div style={lbl}>Hashtags</div><div style={{background:'#0f0f0f',border:'1px solid #1e1e1e',borderRadius:3,padding:'10px 12px',fontFamily:'Inter',fontSize:10,color:tweaks.accent,lineHeight:1.9}}>{hashtags}</div></div>}
                <button onClick={()=>{navigator.clipboard.writeText(caption+'\n\n.\n.\n.\n'+hashtags);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{width:'100%',padding:'10px 0',background:copied?tweaks.accent:'transparent',border:`1px solid ${tweaks.accent}55`,color:copied?'#000':tweaks.accent,fontFamily:'Inter',fontSize:10,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',borderRadius:3,cursor:'pointer'}}>{copied?'✓ Copiado!':'Copiar Tudo'}</button>
              </>
            ):(
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,opacity:.4,paddingTop:40}}>
                <div style={{fontFamily:'Inter',fontSize:10,color:'#fff',textAlign:'center',lineHeight:1.7}}>Gere um carrossel.<br/>A legenda aparece aqui.</div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── TWEAKS ── */}
      {showTweaks&&(
        <div style={{position:'fixed',bottom:20,right:278,width:228,background:'#0f0f0f',border:'1px solid #222',borderRadius:8,padding:16,zIndex:300,boxShadow:'0 20px 60px rgba(0,0,0,0.9)'}}>
          <div style={{fontFamily:'Inter',fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:tweaks.accent,marginBottom:14}}>Tweaks</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div><label style={lbl}>Handle</label><input value={tweaks.handle} onChange={e=>updateTweak('handle',e.target.value)} style={{...inp,background:'#1a1a1a'}}/></div>
            <div><label style={lbl}>Cor de Destaque</label><div style={{display:'flex',gap:7,flexWrap:'wrap'}}>{['#00FFB2','#C8FF00','#DFFF00','#FFF200','#FFFFFF'].map(c=><div key={c} onClick={()=>updateTweak('accent',c)} style={{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:tweaks.accent===c?'2.5px solid #fff':'2.5px solid transparent'}}/>)}</div></div>
            <div><label style={lbl}>Orbe — {tweaks.orbOpacity}%</label><input type="range" min={0} max={30} value={tweaks.orbOpacity} onChange={e=>updateTweak('orbOpacity',+e.target.value)} style={{width:'100%'}}/></div>
            <div><label style={lbl}>Grade — {tweaks.gridOpacity}%</label><input type="range" min={0} max={15} value={tweaks.gridOpacity} onChange={e=>updateTweak('gridOpacity',+e.target.value)} style={{width:'100%'}}/></div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
